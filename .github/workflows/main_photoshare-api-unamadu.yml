# Build & deploy Node.js backend (in /backend) + frontend (in /frontend) to Azure Web App

name: Build and deploy Node.js app to Azure Web App - photoshare-api-unamadu

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci --omit=dev

      - name: Stage deployment package
        run: |
          mkdir -p deploy-pkg/frontend
          cp -r backend/. deploy-pkg/
          cp -r frontend/. deploy-pkg/frontend/
          cd deploy-pkg && zip -r ../release.zip . -x "node_modules/.cache/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_62910BC6509B4308AA0D1840E2AEDF6F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FFCE032FD4E3489689DD96494931BAA0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5624E843CB3B411BAF8D6424EF5C664A }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'photoshare-api-unamadu'
          slot-name: 'Production'
          package: .